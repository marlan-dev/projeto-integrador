<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav>...</nav>
<main class="container">
    <h1>Fale conosco</h1>
    <div class="contact-info">
        <p><i class="fas fa-envelope"></i> contato@maosqueajudam.org</p>
        <p><i class="fas fa-phone"></i> (24) 98765-4321</p>
        <p><i class="fab fa-instagram"></i> @maosqueajudam</p>
    </div>
    <form id="contact-form">
        <div class="form-group"><input type="text" placeholder="Seu nome" id="contact-nome"></div>
        <div class="form-group"><input type="email" placeholder="E-mail" id="contact-email"></div>
        <div class="form-group"><textarea placeholder="Sua mensagem" rows="4" id="contact-msg"></textarea></div>
        <button type="submit">Enviar mensagem</button>
    </form>
</main>
<script src="scripts.js"></script>
</body>
</html>

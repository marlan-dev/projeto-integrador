<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Quero Doar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav>...</nav>
<main class="container">
    <h1>Escolha uma causa</h1>
    <div class="card-grid" id="campanhas-lista"></div>

    <h2>Formulário de Doação</h2>
    <form id="donation-form">
        <div class="form-group">
            <label>Causa</label>
            <select id="causa" required>
                <option value="Crianças">Crianças</option>
                <option value="Animais">Animais</option>
                <option value="Alimentos">Alimentos</option>
            </select>
        </div>
        <div class="form-group">
            <label>Valor (R$)</label>
            <input type="number" id="valor" required placeholder="Ex: 50, 100">
        </div>
        <div class="form-group">
            <label>Forma de pagamento</label>
            <select id="metodo">
                <option>Pix</option>
                <option>Cartão de Crédito</option>
                <option>Boleto</option>
            </select>
        </div>
        <div class="form-group">
            <label>Nome completo</label>
            <input type="text" id="nome-doador" required>
        </div>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="email-doador" required>
        </div>
        <div class="form-group">
            <label>Telefone</label>
            <input type="text" id="telefone">
        </div>
        <button type="submit">Finalizar Doação</button>
    </form>
    <p id="donation-feedback"></p>
</main>
<script src="scripts.js"></script>
</body>
</html>
